<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Admin - Gestion utilisateurs</title>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<style>
body {
    font-family: Arial;
    padding: 20px;
    background: #f4f4f4;
}

h2 {
    color: #2c3e50;
}

input, select {
    padding: 8px;
    margin: 5px;
}

button {
    padding: 8px;
    background: #2c3e50;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #1a252f;
}

.card {
    background: white;
    padding: 20px;
    margin-top: 20px;
    border-radius: 8px;
}

table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
}

td, th {
    padding: 10px;
    border: 1px solid #ddd;
}
</style>

</head>
<body>

<h2>👑 ADMIN - Gestion des utilisateurs</h2>

<!-- 🔥 INVITATION -->
<div class="card">
<h3>📧 Inviter un utilisateur</h3>

<input type="email" id="inviteEmail" placeholder="Email">
<select id="role">
    <option value="user">Utilisateur</option>
    <option value="admin">Admin</option>
</select>

<button onclick="sendInvite()">Envoyer invitation</button>
</div>

<!-- 🔥 LISTE UTILISATEURS -->
<div class="card">
<h3>👥 Utilisateurs</h3>

<table>
<thead>
<tr>
<th>Nom</th>
<th>Email</th>
<th>Status</th>
<th>Rôle</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="usersTable"></tbody>

</table>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore, collection, getDocs, doc, updateDoc, deleteDoc, setDoc, onSnapshot, serverTimestamp, getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


// CONFIG
const firebaseConfig = {
   apiKey: "AIzaSyA58NXhLlnvjdczxfqUSczrRBz1HJrI77I",
   authDomain: "compta-hirsi.firebaseapp.com",
  projectId: "compta-hirsi",
  storageBucket: "compta-hirsi.firebasestorage.app",
  messagingSenderId: "677903647731",
  appId: "1:677903647731:web:4292c36862a308af5b8886"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
emailjs.init("5Ixx12pk9TG1qA7EF");

// 🔐 SECURITE ADMIN
onAuthStateChanged(auth, async (user) => {

if (!user) {
    window.location.href = "index.html";
    return;
}
    const snap = await getDoc(doc(db, "users", user.uid));

    if (!snap.exists()) return;

    const data = snap.data();

    if (data.status !== "active") {
        alert("Votre compte n'est pas activé.");
      window.location.href = "index.html";
      return;
    }

    // 🔥 exemple permission
   if (data.role !== "admin") {
        alert("Accès refusé.");
      window.location.href = "register.html";
      return;
  }
  if (data.permissions.caisse === "read") {
  // désactiver bouton ajout
  document.getElementById("addBtn").style.display = "none";
}
snap.forEach(docItem => {
    if (docItem.id === user.uid && docItem.data().role === "admin") {
        isAdmin = true;
    }
});


  console.log("Admin autorisé");
});




const snap = await getDocs(collection(db, "users"));
let isAdmin = true;



if (!isAdmin) {
    alert("Accès refusé");
    window.location.href = "register.html";
}

// 📧 INVITATION
window.sendInvite = async () => {

const email = document.getElementById("inviteEmail").value;
const role = document.getElementById("role").value;

if (!email) {
    alert("Email invalide");
    return;
}

await setDoc(doc(db, "invitations", email), {
    email,
    role,
    status: "pending",
    createdAt: serverTimestamp()
});

const inviteLink = `${window.location.origin}/index.html?email=${encodeURIComponent(email)}`;

await emailjs.send("service_67ytgke", "template_kb1xwgf", {
    to_email: email,
    invite_link: inviteLink
});

alert("Invitation envoyée !");
};

// 👥 AFFICHER UTILISATEURS
function loadUsers() {

onSnapshot(collection(db, "users"), (snapshot) => {

const table = document.getElementById("usersTable");
table.innerHTML = "";

snapshot.forEach(docItem => {

const data = docItem.data();

const tr = document.createElement("tr");

tr.innerHTML = `
<td>${data.prenom} ${data.nom}</td>
<td>${data.email}</td>
<td>${data.status}</td>
<td>${data.role}</td>
<td>
<button onclick="activateUser('${docItem.id}')">Activer</button>
<button onclick="disableUser('${docItem.id}')">Désactiver</button>
<button onclick="deleteUser('${docItem.id}')">Supprimer</button>
</td>
`;

table.appendChild(tr);

});
});
}

// 🔥 ACTIONS
window.activateUser = async (uid) => {
await updateDoc(doc(db, "users", uid), {
    status: "active"
}, { merge: true });
};

window.disableUser = async (uid) => {
await updateDoc(doc(db, "users", uid), {
    status: "disabled"
}, { merge: true });
};

window.deleteUser = async (uid) => {
if (!confirm("Supprimer cet utilisateur ?")) return;

await deleteDoc(doc(db, "users", uid));
};

loadUsers();

</script>

</body>
</html>
