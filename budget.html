<!DOCTYPE html>

<style>

<body>

<!-- 🔥 MENU -->

            </nav>

     <div class="right-box">

</header>
<h1>Ajouter une ligne</h1>

<form id="form">
    <input type="text" id="numero" placeholder="Numéro (1, 11, 121)" required><br><br>
    <input type="text" id="libelle" placeholder="Libellé" required><br><br>
    <input type="number" id="montant" placeholder="Montant" required><br><br>

    <button type="submit">Ajouter</button>
</form>

<hr>

<h2>Tableau Budget</h2>

<table>
<thead>
<tr>
    <th>N° ligne</th>
    <th>Libellé</th>
    <th>Montant</th>
    <th>Actions</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

<tfoot>
<tr>
    <td colspan="2"><strong>Total</strong></td>
    <td id="total">0</td>
    <td style="width:200px;"></td>
</tr>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
    getFirestore, collection, addDoc, getDocs,
    deleteDoc, doc, updateDoc, getDoc, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA58NXhLlnvjdczxfqUSczrRBz1HJrI77I",
  authDomain: "compta-hirsi.firebaseapp.com",
  projectId: "compta-hirsi",
  storageBucket: "compta-hirsi.firebasestorage.app",
  messagingSenderId: "677903647731",
  appId: "1:677903647731:web:4292c36862a308af5b8886"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const form = document.getElementById("form");
const tableBody = document.getElementById("tableBody");
const numeroInput = document.getElementById("numero");
const libelleInput = document.getElementById("libelle");
const montantInput = document.getElementById("montant");

// 🔥 AJOUT
form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const numero = numeroInput.value;
    const libelle = libelleInput.value;
    const montant = parseFloat(montantInput.value);

    await addDoc(collection(db, "budget"), {
        numero,
        libelle,
        montant
    });

    form.reset();
    afficherBudget();
});

// 🔥 TRI
function trierHierarchique(a, b) {
    const na = a.numero.split("").map(Number);
    const nb = b.numero.split("").map(Number);

    for (let i = 0; i < Math.max(na.length, nb.length); i++) {
        const diff = (na[i] || 0) - (nb[i] || 0);
        if (diff !== 0) return diff;
    }
    return 0;
}

// 🔥 NIVEAU
function getLevel(numero) {
    return numero.length - 1;
}

// 🔥 AFFICHAGE
async function afficherBudget() {

    tableBody.innerHTML = "";

    const snapshot = await getDocs(collection(db, "budget"));

    let data = [];
    let total = 0;

    snapshot.forEach(docItem => {
        data.push({
            id: docItem.id,
            ...docItem.data()
        });
    });

    data.sort(trierHierarchique);

    data.forEach(item => {

        total += item.montant || 0;

        const level = getLevel(item.numero);

        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${item.numero}</td>
            <td class="indent-${level}">${item.libelle}</td>
            <td>${(item.montant).toLocaleString()} FCFA</td>
            <td>
                <button onclick="modifier('${item.id}', '${item.numero}', '${item.libelle}', ${item.montant})">Modifier</button>
                <button onclick="supprimer('${item.id}')">Supprimer</button>
            </td>
        `;

        tableBody.appendChild(tr);
    });

    document.getElementById("total").textContent = total.toLocaleString() + " FCFA";
}

// 🔥 SUPPRIMER
window.supprimer = async (id) => {

    if (!confirm("Supprimer cette ligne ?")) return;

    await deleteDoc(doc(db, "budget", id));

    afficherBudget();
};

// 🔥 MODIFIER
window.modifier = async (id, numero, libelle, montant) => {

    const newNumero = prompt("Nouveau numéro :", numero);
    const newLibelle = prompt("Nouveau libellé :", libelle);
    const newMontant = prompt("Nouveau montant :", montant);

    if (!newNumero || !newLibelle || !newMontant) return;

    await updateDoc(doc(db, "budget", id), {
        numero: newNumero,
        libelle: newLibelle,
        montant: parseFloat(newMontant)
    });
    afficherBudget();
};

// INIT

afficherBudget();

const links = document.querySelectorAll("nav a");

// récupérer le nom de la page actuelle
const currentPage = window.location.pathname.split("/").pop();

links.forEach(link => {
    const linkPage = link.getAttribute("href");

    if (linkPage === currentPage) {
        link.style.color = "#ffd700"; // optionnel (couleur)
    }
});
async function chargerProjet() {

    const ref = doc(db, "parametres", "config");
    const snap = await getDoc(ref);

    const nom = snap.exists() ? snap.data().nomProjet : "Projet";

    document.getElementById("projectName").textContent = nom;
}
window.logout = () => {
  signOut(auth).then(() => {
    window.location.href = "index.html";
  });
};

onAuthStateChanged(auth, async (user) => {
if (user) {

    onSnapshot(doc(db, "users", user.uid), (snap) => {

      if (snap.exists()) {
        const data = snap.data();

        document.getElementById("userPhoto").src =
          data.photo || "https://via.placeholder.com/40";

        document.getElementById("userName").textContent =
          data.prenom + " " + data.nom;
      
  //     document.getElementById("preview").src =
  // data.photo || "https://via.placeholder.com/120";
        console.log("Auth OK");
      }
      });
  } else {
    window.location.href = "index.html";
  }
});

chargerProjet();
</script>

</body>
</html>
