<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut, setPersistence, browserSessionPersistence } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyA58NXhLlnvjdczxfqUSczrRBz1HJrI77I",
  authDomain: "compta-hirsi.firebaseapp.com",
  projectId: "compta-hirsi",
  storageBucket: "compta-hirsi.firebasestorage.app",
  messagingSenderId: "677903647731",
  appId: "1:677903647731:web:4292c36862a308af5b8886"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
await setPersistence(auth, browserSessionPersistence);

onSnapshot(doc(db, "parametres", "config"), (snap) => {
  if (snap.exists()) {
    const data = snap.data();
        document.getElementById("companyName").textContent =
        snap.data().nomSociete || "Société";
    
        document.getElementById("projectName").textContent =
      snap.data().nomProjet || "Projet";
  }
});
window.logout = () => {
  signOut(auth).then(() => {
    window.location.href = "index.html";
  });
};

onAuthStateChanged(auth, async (user) => {
if (user) {

    onSnapshot(doc(db, "users", user.uid), (snap) => {

      if (snap.exists()) {
        const data = snap.data();

        document.getElementById("userPhoto").src =
          data.photo || "https://via.placeholder.com/40";

        document.getElementById("userName").textContent =
          data.prenom + " " + data.nom;
      
  //     document.getElementById("preview").src =
  // data.photo || "https://via.placeholder.com/120";
        console.log("Auth OK");
      }
      });
  } else {
    window.location.href = "index.html";
  }
});

// 🔥 ENREGISTRER NOM PROJET
window.saveProjet = async () => {

    const nom = document.getElementById("nomProjet").value;

    if (!nom) {
        alert("Nom invalide");
        return;
    }

    await setDoc(doc(db, "parametres", "config"), {
        nomProjet: nom
    }, { merge: true });

    alert("Nom enregistré !");
};


// INIT
const links = document.querySelectorAll("nav a");

// récupérer le nom de la page actuelle
const currentPage = window.location.pathname.split("/").pop();

links.forEach(link => {
    const linkPage = link.getAttribute("href");

    if (linkPage === currentPage) {
        link.style.color = "#ffd700"; // optionnel (couleur)
    }
});
</script>
